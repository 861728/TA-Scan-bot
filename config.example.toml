[runtime]
# S&P 100 (OEX) 구성 종목
symbols = [
  "AAPL", "MSFT", "NVDA", "AMZN", "GOOG", "GOOGL", "META", "TSLA", "BRK-B", "AVGO",
  "JPM", "LLY", "V", "UNH", "XOM", "MA", "COST", "HD", "PG", "WMT",
  "NFLX", "JNJ", "ABBV", "BAC", "CRM", "CVX", "MRK", "ORCL", "KO", "AMD",
  "PEP", "TMO", "ACN", "MCD", "CSCO", "LIN", "TXN", "ABT", "PM", "ADBE",
  "IBM", "DHR", "GE", "CAT", "QCOM", "INTU", "VZ", "NEE", "ISRG", "BKNG",
  "SPGI", "RTX", "PFE", "AMGN", "HON", "LOW", "TJX", "CMCSA", "UBER", "AMAT",
  "GS", "MS", "UNP", "BLK", "SYK", "VRTX", "AXP", "GILD", "DE", "ADI",
  "REGN", "C", "BSX", "PLD", "SCHW", "CB", "MDT", "PANW", "MU", "ETN",
  "SO", "DUK", "ZTS", "CI", "SLB", "WFC", "ICE", "COP", "CME", "LRCX",
  "SBUX", "BMY", "MMM", "ELV", "AON", "MDLZ", "KLAC", "MCO", "PGR", "NOC"
]
timeframe = "15m"
htf_filter = ["1h", "1d"]
interval_seconds = 1800   # 100개 종목 → 30분 간격 권장
fetch_delay_seconds = 0.5  # 종목 간 레이트리밋 방지 딜레이 (초)
cache_dir = "data/cache"

[scoring]
score_threshold = 5
ai_call_threshold = 6
min_s_hits_for_ai = 2
min_volume_multiple = 1.5   # 거래량이 20봉 평균 대비 최소 이 배수 이상이어야 알림 발송 (0 = 비활성화)

[weights]
# S-grade (3pts each)
wvf_spike = 3
volume_capitulation_spike = 3
obv_divergence = 3
# A-grade (1pt each)
mfi = 1
cmf = 1
triple_stoch_rsi = 1
macd_divergence = 1
ad_line_divergence = 1
composite_oscillator = 1
vpt = 1
nvi_pvi = 1
rsi_sma200 = 1
bb_stoch = 1
macd_obv_divergence = 1
fibonacci_618 = 1
ichimoku_rsi_obv = 1
k_reversal = 1

[alerts]
cooldown_minutes = 120
strengthen_delta = 3
allow_premarket = true
allow_regular = true

[ai]
per_symbol_daily = 3
global_daily = 20
anthropic_api_key = ""   # sk-ant-... 입력 시 Claude 자동 활성화, 빈 칸이면 규칙 기반 fallback

[backtest]
lookback_months = 12
precision_rebound_days = 5
precision_rebound_threshold_pct = 3.0
target_precision_pct = 70.0
target_mdd_pct = -5.0
target_avg_rebound_pct = 5.0

[telegram]
bot_token = ""
chat_id = ""
